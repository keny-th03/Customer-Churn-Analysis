<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            background-image: url("{{ url_for('static', filename='churn.png') }}");
            background-repeat: no-repeat;
            background-position: left bottom;
            background-size: 420px;
            padding: 40px;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            width: 420px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #d32f2f;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #b71c1c;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 Customer Churn Predictor</h2>
    <form action="/predict" method="post">

        <label>Tenure (Months):</label>
        <input type="number" name="tenure" required>

        <label>Monthly Charges:</label>
        <input type="number" step="0.01" name="MonthlyCharges" required>

        <label>Total Charges:</label>
        <input type="number" step="0.01" name="TotalCharges" required>

        <label>Contract Type:</label>
        <select name="Contract" required>
            <option value="Month-to-month">Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
        </select>

        <label>Payment Method:</label>
        <select name="PaymentMethod" required>
            <option value="Electronic check">Electronic check</option>
            <option value="Mailed check">Mailed check</option>
            <option value="Bank transfer (automatic)">Bank transfer</option>
            <option value="Credit card (automatic)">Credit card</option>
        </select>

        <label>Internet Service:</label>
        <select name="InternetService" required>
            <option value="DSL">DSL</option>
            <option value="Fiber optic">Fiber optic</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Predict Churn</button>
    </form>
</div>

</body>
</html>
